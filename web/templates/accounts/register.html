{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(80vh-100px)]">
    <div class="apple-card p-10 w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold tracking-tight text-gray-900">Create Account</h2>
            <p class="text-gray-500 mt-2 text-sm">Join the forensics team</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}

            {% for field in form %}
            <div>
                <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">{{field.label }}</label>
                <div class="text-red-500 text-xs mb-1">{{ field.errors }}</div>
                <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}" id="{{ field.id_for_label }}"
                    class="w-full rounded-lg border-gray-300 border px-4 py-3 text-sm focus:border-blue-500 focus:ring-blue-500 shadow-sm transition-colors"
                    {% if field.value %}value="{{ field.value }}" {% endif %} {% if field.field.required %}required{%endif %}>
                {% if field.help_text %}
                <p class="mt-1 text-xs text-gray-500">{{ field.help_text|safe }}</p>
                {% endif %}
            </div>
            {% endfor %}

            <div class="pt-2">
                <button type="submit"
                    class="w-full bg-green-600 text-white rounded-lg px-4 py-3 font-medium hover:bg-green-700 transition-colors shadow-sm text-sm">
                    Create Account
                </button>
            </div>
        </form>

        <div class="mt-8 text-center border-t border-gray-100 pt-6">
            <p class="text-sm text-gray-500">
                Already have an account?
                <a href="{% url 'login' %}" class="text-blue-600 hover:text-blue-700 font-medium hover:underline">Log in
                    here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
